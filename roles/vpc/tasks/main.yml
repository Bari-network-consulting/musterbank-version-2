---
# Phase 1 - vPC domains (server leafs only; NEVER the BGWs - W5)

- name: Gather port-channel state (peer-link replay safety, NX-OS 10.2.3+)
  cisco.nxos.nxos_command:
    commands:
      - show port-channel summary
  register: po_state

- name: Determine whether peer-link members are already bundled
  ansible.builtin.set_fact:
    peer_link_bundled: "{{ ('Po' ~ peer_link_id) in po_state.stdout[0] }}"

- name: Ensure peer-link and keepalive PARENT interfaces are admin-up (idempotent)
  cisco.nxos.nxos_interfaces:
    config:
      - {name: "{{ peer_link_members[0] }}", enabled: true}
      - {name: "{{ peer_link_members[1] }}", enabled: true}
      - {name: "{{ keepalive_parent }}", enabled: true}
    state: merged

- name: Apply vPC domain, keepalive/backup subinterfaces and peer-link
  cisco.nxos.nxos_config:
    src: vpc.j2
    save_when: changed

- name: Fresh build only - wait for the peer-link bundle to form
  cisco.nxos.nxos_command:
    commands:
      - show vpc
    wait_for:
      - result[0] contains "peer is alive"
    retries: 30
    interval: 10
  when: not peer_link_bundled
  vars:
    ansible_command_timeout: 400
